set-environment -g TMUX_CONF "$HOME/.config/tmux/tmux.conf"
set-environment -g TMUX_CONF_LOCAL "$HOME/.config/tmux/tmux.conf.local"

# Oh My Tmux skips plugin setup until the first session exists.
set-hook -g session-created 'if-shell -F "#{==:#{@tpm_plugins},}" "source-file \"$HOME/.config/tmux/tmux.conf\""'
source-file "$HOME/.config/tmux/tmux.conf"
